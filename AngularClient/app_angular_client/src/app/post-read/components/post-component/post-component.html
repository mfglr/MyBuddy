<div class="wrapper card">
  <div class="user">
    <app-post-user-card-component
      [diameter]="userMediaDiameter"
      [baseUrl]="baseUrl"
      [post]="post">
    </app-post-user-card-component>
  </div>
  <app-media-slider [baseUrl]="baseUrl" [media]="post.media.map(map)"></app-media-slider>

  @if(post.content){
    <div class="content">
      <app-post-content-component [post]="post"></app-post-content-component>
    </div>
  }
</div>
