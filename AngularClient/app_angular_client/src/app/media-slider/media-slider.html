
<swiper-container
  pagination="true"
  pagination-clickable="true"
  (swiperslidechange)="onSlideChange($event)">
  @for (mediaItem of media; track $index) {
    <swiper-slide>
      @if(mediaItem.type === MediaType.image){
        <app-image-component
          #media
          [media]="mediaItem"
          [aspectRatio]="aspectRatio"
          [baseUrl]="baseUrl"
          (dimentionsReady)="setDimension($event)">
        </app-image-component>
      }
      @else if(mediaItem.type === MediaType.video){
        <app-video-component
          #media
          [media]="mediaItem"
          [aspectRatio]="aspectRatio"
          [autoplay]="$index === 0"
          [loop]="true"
          [baseUrl]="baseUrl"
          (dimensionsReady)="setDimension($event)">
        </app-video-component>
      }
    </swiper-slide>
  }
</swiper-container>
