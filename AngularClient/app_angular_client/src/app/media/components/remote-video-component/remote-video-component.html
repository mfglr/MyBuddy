<video
  #video
  class="video"
  [src]="'http://localhost:5284/api/v1/blobs/get/' + media.containerName + '/' + media.blobName"
  (ended)="pause()"
  (timeupdate)="update()"
  (progress)="update()"
  (click)="paused ? play() : pause();"
  [autoplay]="autoplay"
  [loop]="loop"
  [style.aspectRatio]="aspectRatio"
>
</video>
